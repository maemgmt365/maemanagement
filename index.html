<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mae Management LLC</title>
  <meta
    name="description"
    content="Mae Management LLC is a management and acquisitions firm headquartered in Austin, Texas, focused on long-term ownership of durable, service-based businesses."
  />

  <style>
    :root{
      /* LIGHT */
      --bg: #f5f0e7;
      --bg-2: #efe7db;
      --surface: rgba(255,255,255,.72);
      --surface-strong: rgba(255,255,255,.86);
      --surface-soft: rgba(255,255,255,.54);

      --ink: #1f1a14;
      --ink-soft: rgba(31,26,20,.78);
      --muted: #665c52;

      --line: rgba(31,26,20,.10);
      --line-strong: rgba(31,26,20,.16);

      --accent: #876040;
      --accent-2: #6b4c31;
      --accent-3: #526b5c;
      --accent-wash: rgba(82,107,92,.10);

      --shadow-xl: 0 30px 90px rgba(31,26,20,.14);
      --shadow-lg: 0 18px 54px rgba(31,26,20,.10);
      --shadow-md: 0 10px 28px rgba(31,26,20,.08);
      --shadow-sm: 0 6px 18px rgba(31,26,20,.06);

      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-pill: 999px;

      --max: 1180px;
      --content: 1080px;

      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --serif: Iowan Old Style, Palatino Linotype, Book Antiqua, Georgia, "Times New Roman", Times, serif;

      --transition: 260ms cubic-bezier(.22,1,.36,1);
    }

    [data-theme="dark"]{
      --bg: #0e100f;
      --bg-2: #141715;
      --surface: rgba(28,25,23,.76);
      --surface-strong: rgba(30,27,24,.88);
      --surface-soft: rgba(255,255,255,.04);

      --ink: rgba(245,240,232,.94);
      --ink-soft: rgba(245,240,232,.78);
      --muted: rgba(245,240,232,.62);

      --line: rgba(245,240,232,.12);
      --line-strong: rgba(245,240,232,.18);

      --accent: #c08a5a;
      --accent-2: #d1a071;
      --accent-3: #7e9d8d;
      --accent-wash: rgba(126,157,141,.12);

      --shadow-xl: 0 34px 100px rgba(0,0,0,.45);
      --shadow-lg: 0 18px 54px rgba(0,0,0,.36);
      --shadow-md: 0 10px 28px rgba(0,0,0,.28);
      --shadow-sm: 0 6px 18px rgba(0,0,0,.22);
    }

    *{ box-sizing:border-box; }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      color:var(--ink);
      font-family:var(--serif);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      background:
        radial-gradient(1100px 600px at 12% -8%, rgba(135,96,64,.14), transparent 58%),
        radial-gradient(900px 520px at 100% 0%, rgba(82,107,92,.12), transparent 54%),
        radial-gradient(1100px 700px at 50% 120%, rgba(31,26,20,.08), transparent 60%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 26%, var(--bg-2) 100%);
      min-height:100vh;
    }

    a{
      color:var(--accent-2);
      text-decoration:none;
      transition:
        color var(--transition),
        border-color var(--transition),
        background-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition),
        opacity var(--transition);
    }

    a:hover{
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
    }

    .site-shell{
      position:relative;
      max-width:var(--max);
      margin:0 auto;
      padding:30px 20px 100px;
    }

    .site-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 20%);
      opacity:.7;
    }

    .topbar{
      position:sticky;
      top:14px;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      padding:14px 16px;
      margin-bottom:26px;
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.04)), var(--surface);
      box-shadow:var(--shadow-md);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition: all 300ms cubic-bezier(.22,1,.36,1);
    }

    .topbar.shrink{
      padding:10px 14px;
      transform:translateY(-2px);
      box-shadow:var(--shadow-lg);
    }

    .mark{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:220px;
    }

    .mark .name{
      font-family:var(--sans);
      font-size:12px;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--ink);
    }

    .mark .sub{
      font-family:var(--sans);
      font-size:12.5px;
      color:var(--muted);
      line-height:1.4;
    }

    .rightControls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    nav{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-family:var(--sans);
      font-size:13px;
    }

    nav a{
      color:var(--muted);
      padding:10px 12px;
      border:1px solid transparent;
      border-radius:var(--radius-pill);
      font-weight:500;
      letter-spacing:.01em;
    }

    nav a:hover{
      color:var(--ink);
      background:var(--surface-soft);
      border-color:var(--line);
      box-shadow:var(--shadow-sm);
      transform:translateY(-1px);
    }

    .themeToggle{
      font-family:var(--sans);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:62px;
      padding:10px 12px;
      border-radius:var(--radius-pill);
      border:1px solid var(--line);
      background:var(--surface-soft);
      color:var(--ink);
      font-size:13px;
      cursor:pointer;
      user-select:none;
      box-shadow:var(--shadow-sm);
    }

    .themeToggle:hover{
      transform:translateY(-1px);
      border-color:var(--line-strong);
    }

    .themeToggle span{
      transition: opacity .16s ease, font-weight .16s ease, transform .16s ease;
    }

    .themeToggle .active{
      opacity:1;
      font-weight:700;
      transform:translateY(-.5px);
    }

    .themeToggle .inactive{
      opacity:.34;
      font-weight:400;
    }

    .hero{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, .85fr);
      gap:28px;
      align-items:stretch;
      padding:38px;
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02)),
        var(--surface-strong);
      box-shadow:var(--shadow-xl);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    h1{
      margin:0 0 16px;
      max-width:12ch;
      font-size:clamp(36px, 4.5vw, 68px);
      line-height:1.04;
      letter-spacing:-.035em;
      color:var(--ink);
      text-wrap:balance;
    }

    .heroPanelText{
      font-family:var(--serif);
      font-size:21px;
      line-height:1.3;
      letter-spacing:-.015em;
      color:var(--ink);
      margin:0;
      max-width:15ch;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:24px;
      margin-top:26px;
    }

    .card{
      position:relative;
      overflow:hidden;
      padding:30px 30px 28px;
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.02)),
        var(--surface);
      box-shadow:var(--shadow-lg);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition: transform 320ms cubic-bezier(.22,1,.36,1), box-shadow 320ms cubic-bezier(.22,1,.36,1);
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow-xl);
    }

    .reveal{
      opacity:0;
      transform:translateY(26px);
      transition:
        opacity 900ms cubic-bezier(.22,1,.36,1),
        transform 900ms cubic-bezier(.22,1,.36,1);
      will-change:opacity, transform;
    }

    .reveal.is-visible{
      opacity:1;
      transform:none;
    }
  </style>
</head>

<body>
  <div class="site-shell">

    <div class="topbar reveal" id="navbar">
      <div class="mark">
        <div class="name">Mae Management LLC</div>
        <div class="sub">Austin, Texas • Long-term ownership • Private & confidential</div>
      </div>

      <div class="rightControls">
        <nav>
          <a href="#about">About</a>
          <a href="#focus">Focus</a>
          <a href="#criteria">Criteria</a>
          <a href="#owner">Owner</a>
          <a href="#team">Team</a>
          <a href="#contact">Contact</a>
        </nav>

        <button class="themeToggle" type="button" onclick="toggleTheme()" aria-label="Toggle day and night mode">
          <span id="iconLight">☀︎</span>
          <span style="opacity:.55;">/</span>
          <span id="iconDark">☾</span>
        </button>
      </div>
    </div>

    <!-- REST OF ORIGINAL HTML CONTINUES UNCHANGED -->

  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const root = document.documentElement;
    const iconLight = document.getElementById("iconLight");
    const iconDark  = document.getElementById("iconDark");

    function setActiveIcons(theme){
      if(theme === "dark"){
        iconDark.className = "active";
        iconLight.className = "inactive";
      } else {
        iconLight.className = "active";
        iconDark.className = "inactive";
      }
    }

    function applyTheme(theme){
      root.setAttribute("data-theme", theme);
      setActiveIcons(theme);
      localStorage.setItem("theme", theme);
    }

    function toggleTheme(){
      const current = root.getAttribute("data-theme") || "dark";
      applyTheme(current === "dark" ? "light" : "dark");
    }

    (function initTheme(){
      const saved = localStorage.getItem("theme");
      if(saved){
        applyTheme(saved);
        return;
      }
      applyTheme("dark");
    })();

    (function navbarScroll(){
      const nav = document.getElementById("navbar");
      window.addEventListener("scroll", () => {
        if(window.scrollY > 30){
          nav.classList.add("shrink");
        } else {
          nav.classList.remove("shrink");
        }
      });
    })();

    (function initReveal(){
      const prefersReduced = window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const elements = document.querySelectorAll(".reveal");

      if(prefersReduced || !("IntersectionObserver" in window)){
        elements.forEach(el => el.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.12,
        rootMargin: "0px 0px -40px 0px"
      });

      elements.forEach(el => observer.observe(el));
    })();
  </script>
</body>
</html>
